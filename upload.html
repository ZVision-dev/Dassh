<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة منشور - Dash</title>

<style>

body{
    background:#000;
    color:white;
    font-family:Arial;
    text-align:center;

.box{
    margin:50px auto;
    width:90%;
    max-width:400px;
    background:#181818;
    padding:20px;
    border-radius:20px;
}

input, textarea{

    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;

}

button{

    background:white;
    padding:12px 25px;
    border:none;
    border-radius:20px;

}

</style>

</head>


<body>


<div class="box">

<h1>➕ منشور جديد</h1>


<input type="file">


<textarea placeholder="اكتب وصف المنشور"></textarea>


<button>
نشر
</button>


</div>
