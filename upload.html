<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة منشور - Dash</title>

<style>

body{
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.box{

    margin:40px auto;
    width:90%;
    max-width:400px;
    background:#181818;
    padding:20px;
    border-radius:20px;

}


input, textarea{

    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;

}


img{

    max-width:90%;
    border-radius:15px;
    margin-top:15px;

}


button{

    background:white;
    color:black;
    padding:12px 25px;
    border:none;
    border-radius:20px;
    cursor:pointer;

}


#result{

    margin-top:20px;

}


</style>

</head>


<body>


<div class="box">


<h1>➕ منشور جديد</h1>


<input 
type="file" 
id="image" 
accept="image/*"
onchange="preview()"
>


<img id="preview">


<textarea 
id="text" 
placeholder="اكتب وصف المنشور">
</textarea>


<button onclick="publish()">
نشر
</button>


<p id="result"></p>


</div>



<script>


function preview(){

let file = document.getElementById("image").files[0];

let img = document.getElementById("preview");


if(file){

img.src = URL.createObjectURL(file);

}

}



function publish(){

let text = document.getElementById("text").value;


if(text == ""){

document.getElementById("result").innerHTML =
"⚠️ اكتب وصف المنشور";

}

else{

document.getElementById("result").innerHTML =
"✅ تم تجهيز المنشور";

}


}


</script>


</body>

</html>
