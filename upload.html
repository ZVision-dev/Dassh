<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة منشور - Dash</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.box{
width:90%;
max-width:400px;
margin:40px auto;
background:#181818;
padding:20px;
border-radius:20px;
}

input,textarea{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

button{
background:#333;
color:white;
border:none;
padding:12px 25px;
border-radius:20px;
}

</style>

</head>


<body>


<div class="box">

<h1>➕ منشور جديد</h1>


<input id="image" placeholder="رابط الصورة">


<textarea id="text" placeholder="اكتب وصف المنشور"></textarea>


<button onclick="publish()">
نشر
</button>


<p id="result"></p>


</div>




<script type="module">


import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {
getFirestore,
collection,
addDoc,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig = {

apiKey: "AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain: "dassh-e5b89.firebaseapp.com",

projectId: "dassh-e5b89",

storageBucket: "dassh-e5b89.firebasestorage.app",

messagingSenderId: "360444967805",

appId: "1:360444967805:web:fe10ef5a579424141caa14"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);



let username = "مستخدم";



onAuthStateChanged(auth, async(user)=>{

if(user){

const userDoc = await getDoc(doc(db,"users",user.uid));


if(userDoc.exists()){

username = userDoc.data().username;

}

}

});





window.publish = async function(){


let text = document.getElementById("text").value;

let image = document.getElementById("image").value;



await addDoc(collection(db,"posts"),{


text:text,

image:image,

username:username,

likes:0,

created:new Date()


});



document.getElementById("result").innerHTML =
"✅ تم نشر المنشور باسمك";


}



</script>


</body>

</html>
