<style>
<style>

<body>


<header>

<h1>🚀 Dash</h1>

<p>👋 مرحبًا بك</p>

</header>


<div id="posts"></div>


<div class="nav">

<a href="index.html">
<button>🏠</button>
</a>

<a href="search.html">
<button>🔍</button>
</a>

<button>📱</button>
</a>

</div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {

getFirestore,
collection,
getDocs,
addDoc,
doc,
updateDoc,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


import {

getAuth,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig={

apiKey:"AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain:"dassh-e5b89.firebaseapp.com",

projectId:"dassh-e5b89",

storageBucket:"dassh-e5b89.firebasestorage.app",

messagingSenderId:"360444967805",

appId:"1:360444967805:web:fe10ef5a579424141caa14"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);



let username="زائر";

let followingList=[];



onAuthStateChanged(auth,async(user)=>{


if(user){

username=user.email;


let follows=await getDocs(

query(

collection(db,"follows"),

where("follower","==",username)

)

);


follows.forEach((f)=>{

followingList.push(f.data().following);

});


}


loadPosts();


});





async function loadPosts(){


const box=document.getElementById("posts");


const snapshot=await getDocs(collection(db,"posts"));



snapshot.forEach((item)=>{


let post=item.data();

let id=item.id;



let followed = followingList.includes(post.username);



box.innerHTML += `


<div class="post">


<h3>


<a href="user.html?user=${post.username}" 
style="color:white;text-decoration:none;">

👤 @${post.username}

</a>



<button class="${followed ? 'followed':'follow'}"
onclick="follow('${post.username}',this)">

${followed ? '✅ متابَع':'➕ متابعة'}

</button>


</h3>



${post.image ? `<img src="${post.image}">`:""}


<p>${post.text}</p>



<button onclick="likePost('${id}',${post.likes || 0},this)">

❤️ ${post.likes || 0}

</button>



<input id="c${id}" placeholder="اكتب تعليق">


<button onclick="addComment('${id}','${post.username}')">

💬 تعليق

</button>



<div id="comments${id}"></div>


</div>


`;



loadComments(id);


});


}async function loadComments(postId){


let comments=await getDocs(

query(

collection(db,"comments"),

where("post","==",postId)

)

);



let area=document.getElementById("comments"+postId);



comments.forEach((item)=>{


let c=item.data();


area.innerHTML += `

<div class="comment">

👤 ${c.user}

<br>

${c.text}

</div>

`;

});


}





window.likePost=async function(id,likes,btn){


await updateDoc(

doc(db,"posts",id),

{

likes:likes+1

}

);


btn.innerHTML="❤️ "+(likes+1);


}





window.addComment=async function(id,owner){


let text=document.getElementById("c"+id).value;


if(text=="") return;



await addDoc(

collection(db,"comments"),

{

post:id,

user:username,

text:text

}

);



await addDoc(

collection(db,"notifications"),

{

to:owner,

text:"💬 "+username+" علق على منشورك"

}

);



location.reload();


}





window.follow=async function(user,btn){


if(user==username){

alert("لا يمكنك متابعة نفسك");

return;

}



let check=await getDocs(

query(

collection(db,"follows"),

where("follower","==",username),

where("following","==",user)

)

);



if(!check.empty){

alert("أنت تتابعه بالفعل");

return;

}



await addDoc(

collection(db,"follows"),

{

follower:username,

following:user

}

);



await addDoc(

collection(db,"notifications"),

{

to:user,

text:"👥 "+username+" بدأ بمتابعتك"

}

);



btn.innerHTML="✅ متابَع";

btn.className="followed";


alert("✅ تمت المتابعة");


}



</script>


</body>

</html>
