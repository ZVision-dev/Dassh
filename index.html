<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dash</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
}

header{
text-align:center;
padding:20px;
background:#111;
}

.post{
width:90%;
max-width:400px;
margin:20px auto;
background:#181818;
padding:15px;
border-radius:20px;
}

.post img{
width:100%;
border-radius:15px;
}

button{
background:#333;
color:white;
border:none;
padding:12px;
border-radius:20px;
margin:5px;
}

a{
text-decoration:none;
}

</style>

</head>


<body>


<header>

<h1>🚀 Dash</h1>

<p>منصة مشاركة المحتوى</p>

<p id="welcome">👋 مرحبًا</p>


<a href="register.html">
<button>👤 إنشاء حساب</button>
</a>


<a href="login.html">
<button>🔐 تسجيل الدخول</button>
</a>


<a href="profile.html">
<button>📱 الحساب</button>
</a>


<a href="upload.html">
<button>➕ إضافة منشور</button>
</a>


</header>



<div id="posts"></div>



<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig = {

apiKey:"AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain:"dassh-e5b89.firebaseapp.com",

projectId:"dassh-e5b89",

storageBucket:"dassh-e5b89.firebasestorage.app",

messagingSenderId:"360444967805",

appId:"1:360444967805:web:fe10ef5a579424141caa14"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);



onAuthStateChanged(auth,async(user)=>{


if(user){

let userDoc=await getDoc(
doc(db,"users",user.uid)
);


if(userDoc.exists()){

document.getElementById("welcome").innerHTML =
"👋 مرحبًا "+userDoc.data().username;

}

}

});




const box=document.getElementById("posts");


const snapshot=await getDocs(collection(db,"posts"));



snapshot.forEach((item)=>{


let post=item.data();

let id=item.id;



box.innerHTML += `


<div class="post">

<h3>👤 @${post.username}</h3>


${post.image ? `<img src="${post.image}">` : ""}


<p>${post.text}</p>



<button onclick="likePost('${id}',${post.likes || 0},this)">

❤️ ${post.likes || 0}

</button>


</div>


`;



});





window.likePost=async function(id,likes,button){


await updateDoc(
doc(db,"posts",id),
{
likes:likes+1
}
);


button.innerHTML="❤️ "+(likes+1);

button.onclick=null;


}



</script>


</body>

</html>
