<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash - Modern</title>
    <style>
        :root { --bg: #0a0a0a; --accent: #3b82f6; --card: #161616; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 100px; }
        
        header { padding: 2rem; text-align: center; border-bottom: 1px solid #222; background: #000; }
        h1 { margin: 0; color: var(--accent); font-size: 1.8rem; }
        
        .posts-container { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        
        .post { width: 100%; max-width: 400px; background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .post img { width: 100%; border-radius: 16px; margin-bottom: 15px; }
        
        button { background: #222; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #333; transform: scale(1.05); }
        .btn-like { background: #222; color: #ff4757; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .nav button { background: none; font-size: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>🚀 Dash</h1>
    </header>

    <div id="posts" class="posts-container"></div>

    <nav class="nav">
        <button onclick="location.href='index.html'">🏠</button>
        <button onclick="location.href='search.html'">🔍</button>
        <button onclick="location.href='upload.html'" style="background:var(--accent)">➕</button>
        <button onclick="location.href='notifications.html'">🔔</button>
        <button onclick="location.href='profile.html'">👤</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",
            authDomain: "dassh-e5b89.firebaseapp.com",
            projectId: "dassh-e5b89",
            storageBucket: "dassh-e5b89.firebasestorage.app",
            messagingSenderId: "360444967805",
            appId: "1:360444967805:web:fe10ef5a579424141caa14"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        async function loadPosts() {
            const box = document.getElementById("posts");
            const snapshot = await getDocs(collection(db, "posts"));
            box.innerHTML = "";
            snapshot.forEach((item) => {
                let post = item.data();
                let id = item.id;
                box.innerHTML += `
                    <div class="post">
                        <h3 style="margin-top:0">@${post.username}</h3>
                        ${post.image ? `<img src="${post.image}">` : ""}
                        <p style="color:#ccc">${post.text}</p>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="btn-like" onclick="likePost('${id}', ${post.likes || 0}, this)">❤️ ${post.likes || 0}</button>
                            <button>💬 تعليق</button>
                        </div>
                    </div>
                `;
            });
        }

        window.likePost = async (id, likes, btn) => {
            await updateDoc(doc(db, "posts", id), { likes: likes + 1 });
            btn.innerHTML = "❤️ " + (likes + 1);
        };

        loadPosts();
    </script>
</body>
</html>
