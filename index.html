<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dash</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
}

header{
text-align:center;
padding:20px;
background:#111;
}

.post{
width:90%;
max-width:400px;
margin:20px auto;
background:#181818;
padding:15px;
border-radius:20px;
}

.post img{
width:100%;
border-radius:15px;
}

input{
width:90%;
padding:10px;
border-radius:10px;
border:0;
}

button{
background:#333;
color:white;
border:0;
padding:10px;
border-radius:20px;
margin:5px;
}

.comment{
background:#333;
padding:10px;
border-radius:10px;
margin:5px;
}

</style>

</head>


<body>


<header>

<h1>🚀 Dash</h1>

<p id="welcome">👋 مرحبًا</p>


<a href="register.html"><button>👤 حساب</button></a>

<a href="login.html"><button>🔐 دخول</button></a>

<a href="upload.html"><button>➕ نشر</button></a>

<a href="profile.html"><button>📱 ملفي</button></a>

</header>



<div id="posts"></div>



<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
updateDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig={

apiKey:"AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain:"dassh-e5b89.firebaseapp.com",

projectId:"dassh-e5b89",

storageBucket:"dassh-e5b89.firebasestorage.app",

messagingSenderId:"360444967805",

appId:"1:360444967805:web:fe10ef5a579424141caa14"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);



let username="زائر";



onAuthStateChanged(auth,(user)=>{

if(user){

username=user.email;

}

});




const box=document.getElementById("posts");


const snapshot=await getDocs(collection(db,"posts"));



snapshot.forEach((item)=>{


let post=item.data();

let id=item.id;



box.innerHTML+=`


<div class="post">


<h3>👤 @${post.username}</h3>


${post.image ? `<img src="${post.image}">`:""}


<p>${post.text}</p>



<button onclick="likePost('${id}',${post.likes || 0},this)">
❤️ ${post.likes || 0}
</button>



<input id="c${id}" placeholder="اكتب تعليق">


<button onclick="addComment('${id}')">
💬 تعليق
</button>



<div id="comments${id}">

</div>



</div>


`;



loadComments(id);



});





async function loadComments(postId){


let comments=await getDocs(

query(

collection(db,"comments"),

where("post","==",postId)

)

);



let area=document.getElementById(
"comments"+postId
);



comments.forEach((item)=>{


let c=item.data();



area.innerHTML += `

<div class="comment">

👤 ${c.user}

<br>

${c.text}

</div>

`;


});


}





window.likePost=async function(id,likes,btn){


await updateDoc(

doc(db,"posts",id),

{

likes:likes+1

}

);


btn.innerHTML="❤️ "+(likes+1);


}





window.addComment=async function(id){


let text=document.getElementById("c"+id).value;


if(text=="") return;



await addDoc(

collection(db,"comments"),

{

post:id,

user:username,

text:text

}

);



location.reload();


}



</script>


</body>

</html>
