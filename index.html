<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dash</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            text-align: center;
        }

        header {
            background: #111;
            padding: 20px;
            position: sticky;
            top: 0;
        }

        header h1 {
            margin: 0;
            font-size: 40px;
        }

        .video {
            width: 350px;
            margin: 30px auto;
            background: #181818;
            padding: 15px;
            border-radius: 20px;
        }

        video {
            width: 100%;
            height: 500px;
            background: #000;
            border-radius: 15px;
        }

        h2 {
            text-align: right;
        }

        p {
            text-align: right;
            color: #ddd;
        }

        button {
            background: #222;
            color: white;
            border: none;
            padding: 12px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #444;
        }

    </style>

</head>


<body>


<header>

    <h1>🚀 Dash</h1>
    <p>منصة الفيديوهات القصيرة</p>

</header>



<div class="video">


    <video controls>

        <source src="" type="video/mp4">

        الفيديو غير موجود

    </video>



    <h2>@zayed</h2>


    <p>
        أهلاً بك في أول نسخة من Dash 🎬
    </p>



    <button onclick="like()">
        ❤️ <span id="likes">0</span>
    </button>


    <button>
        💬 تعليق
    </button>


    <button>
        📤 مشاركة
    </button>



</div>



<script>

let count = 0;


function like(){

    count++;

    document.getElementById("likes").innerHTML = count;

}

</script>



</body>

</html>
