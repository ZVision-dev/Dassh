<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dash</title>

<style>

body {
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
}

header {
    text-align:center;
    padding:20px;
    background:#111;
}

.post {
    width:90%;
    max-width:400px;
    margin:30px auto;
    background:#181818;
    padding:15px;
    border-radius:20px;
}

button {
    background:#333;
    color:white;
    border:none;
    padding:12px;
    border-radius:20px;
    margin:5px;
}

a {
    text-decoration:none;
}

</style>

</head>


<body>


<header>

<h1>🚀 Dash</h1>

<p>منصة مشاركة المحتوى</p>

<a href="upload.html">
<button>➕ إضافة منشور</button>
</a>

</header>


<div id="posts"></div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain: "dassh-e5b89.firebaseapp.com",

projectId: "dassh-e5b89",

storageBucket: "dassh-e5b89.firebasestorage.app",

messagingSenderId: "360444967805",

appId: "1:360444967805:web:fe10ef5a579424141caa14"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



const postsBox = document.getElementById("posts");


const snapshot = await getDocs(collection(db,"posts"));


snapshot.forEach((doc)=>{

let post = doc.data();


postsBox.innerHTML += `

<div class="post">

<h3>👤 @${post.username}</h3>

<p>${post.text}</p>

<button>
❤️ إعجاب
</button>

</div>

`;

});


</script>


</body>

</html>
