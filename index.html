<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
color:inherit;
} html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dash</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#050816,#0f172a,#050816);
color:#fff;
overflow-x:hidden;
padding-bottom:100px;
}

header{
position:sticky;
top:0;
z-index:1000;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 20px;
background:rgba(10,15,25,.75);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.08);
}

header h1{
font-size:32px;
font-weight:bold;
background:linear-gradient(90deg,#4F8CFF,#8B5CF6,#00D4FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

header p{
font-size:13px;
color:#9ca3af;
margin-top:5px;
}

#posts{
padding:20px;
display:flex;
flex-direction:column;
gap:22px;
}

.post{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:24px;
padding:18px;
box-shadow:0 10px 35px rgba(0,0,0,.35);
transition:.35s;
animation:fade .5s ease;
}

.post:hover{
transform:translateY(-5px);
box-shadow:0 18px 40px rgba(79,140,255,.25);
}

.post img{
width:100%;
border-radius:18px;
margin:15px 0;
transition:.35s;
}

.post img:hover{
transform:scale(1.02);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}.post-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.user-info{
display:flex;
align-items:center;
gap:12px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#4F8CFF,#7C3AED);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
color:#fff;
box-shadow:0 0 20px rgba(79,140,255,.35);
}

.username{
color:#fff;
font-size:17px;
font-weight:bold;
text-decoration:none;
transition:.3s;
}

.username:hover{
color:#60A5FA;
}

.post-time{
font-size:12px;
color:#8b8b8b;
margin-top:3px;
}

button{
background:linear-gradient(135deg,#2563eb,#4F8CFF);
color:#fff;
border:none;
padding:10px 16px;
border-radius:14px;
cursor:pointer;
transition:.25s;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

.follow{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.followed{
background:#555;
}

input{
width:100%;
padding:13px;
margin-top:12px;
background:#1d2435;
color:white;
border:none;
border-radius:14px;
outline:none;
}

.comment{
margin-top:10px;
padding:12px;
border-radius:14px;
background:#1a2232;
border-left:3px solid #4F8CFF;
}.nav{
position:fixed;
bottom:12px;
left:50%;
transform:translateX(-50%);
width:95%;
max-width:500px;
display:flex;
justify-content:space-around;
align-items:center;
padding:12px;
background:rgba(15,20,30,.82);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.nav a{
text-decoration:none;
}

.nav button{
background:transparent;
border:none;
font-size:24px;
color:#bfc7d5;
padding:12px;
border-radius:16px;
transition:.3s;
}

.nav button:hover{
background:rgba(79,140,255,.15);
color:#4F8CFF;
transform:translateY(-3px);
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-track{
background:#0b1120;
}

::-webkit-scrollbar-thumb{
background:#4F8CFF;
border-radius:20px;
}

::selection{
background:#4F8CFF;
color:white;
}

a{
color:inherit;
}
</style>

</head>


<body>


<header>

<h1>🚀 Dash</h1>

<p>👋 مرحبًا بك</p>

</header>


<div id="posts"></div>


<div class="nav">

<a href="index.html">
<button>🏠</button>
</a>

<a href="search.html">
<button>🔍</button>
</a>

<a href="upload.html">
<button>➕</button>
</a>

<a href="notifications.html">
<button>🔔</button>
</a>

<a href="messages.html">
<button>💬</button>
</a>

<a href="profile.html">
<button>📱</button>
</a>

</div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {

getFirestore,
collection,
getDocs,
addDoc,
doc,
updateDoc,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


import {

getAuth,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig={

apiKey:"AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain:"dassh-e5b89.firebaseapp.com",

projectId:"dassh-e5b89",

storageBucket:"dassh-e5b89.firebasestorage.app",

messagingSenderId:"360444967805",

appId:"1:360444967805:web:fe10ef5a579424141caa14"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);



let username="زائر";

let followingList=[];



onAuthStateChanged(auth,async(user)=>{


if(user){

username=user.email;


let follows=await getDocs(

query(

collection(db,"follows"),

where("follower","==",username)

)

);


follows.forEach((f)=>{

followingList.push(f.data().following);

});


}


loadPosts();


});





async function loadPosts(){


const box=document.getElementById("posts");


const snapshot=await getDocs(collection(db,"posts"));



snapshot.forEach((item)=>{


let post=item.data();

let id=item.id;



let followed = followingList.includes(post.username);



box.innerHTML += `


<div class="post">

<div class="post-header">

<div class="user-info">

<div class="avatar">
👤
</div>

<div>

<a href="user.html?user=${post.username}" class="username">
@${post.username}
</a>

<div class="post-time">
الآن
</div>

</div>

</div>

<button class="${followed ? 'followed':'follow'}"
onclick="follow('${post.username}',this)">
${followed ? "✓":"+"}
</button>

</div>



${post.image ? `<img src="${post.image}">`:""}


<p>${post.text}</p>



<button onclick="likePost('${id}',${post.likes || 0},this)">

❤️ ${post.likes || 0}

</button>



<input id="c${id}" placeholder="اكتب تعليق">


<button onclick="addComment('${id}','${post.username}')">

💬 تعليق

</button>



<div id="comments${id}"></div>


</div>


`;



loadComments(id);


});


}async function loadComments(postId){


let comments=await getDocs(

query(

collection(db,"comments"),

where("post","==",postId)

)

);



let area=document.getElementById("comments"+postId);



comments.forEach((item)=>{


let c=item.data();


area.innerHTML += `

<div class="comment">

👤 ${c.user}

<br>

${c.text}

</div>

`;

});


}





window.likePost=async function(id,likes,btn){


await updateDoc(

doc(db,"posts",id),

{

likes:likes+1

}

);


btn.innerHTML="❤️ "+(likes+1);


}





window.addComment=async function(id,owner){


let text=document.getElementById("c"+id).value;


if(text=="") return;



await addDoc(

collection(db,"comments"),

{

post:id,

user:username,

text:text

}

);



await addDoc(

collection(db,"notifications"),

{

to:owner,

text:"💬 "+username+" علق على منشورك"

}

);



location.reload();


}





window.follow=async function(user,btn){


if(user==username){

alert("لا يمكنك متابعة نفسك");

return;

}



let check=await getDocs(

query(

collection(db,"follows"),

where("follower","==",username),

where("following","==",user)

)

);



if(!check.empty){

alert("أنت تتابعه بالفعل");

return;

}



await addDoc(

collection(db,"follows"),

{

follower:username,

following:user

}

);



await addDoc(

collection(db,"notifications"),

{

to:user,

text:"👥 "+username+" بدأ بمتابعتك"

}

);



btn.innerHTML="✅ متابَع";

btn.className="followed";


alert("✅ تمت المتابعة");


}



</script>


</body>

</html>
