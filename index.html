<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dash</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
}


header{
    position:fixed;
    top:0;
    width:100%;
    background:#000;
    padding:15px;
    text-align:center;
    z-index:10;
}


header h1{
    margin:0;
    color:white;
}


.video-box{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;

}


video{

    width:100%;
    height:100vh;
    object-fit:cover;
}



.info{

    position:absolute;
    bottom:80px;
    right:20px;
    text-align:right;

}


.info h2{
    margin:0;
}


.buttons{

    position:absolute;
    left:20px;
    bottom:120px;
    display:flex;
    flex-direction:column;

}


button{

    margin:10px;
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
    background:#222;
    color:white;
    font-size:20px;

}


nav{

    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:15px;

}


nav span{
    font-size:25px;
}


</style>

</head>


<body>


<header>
<h1>🚀 Dash</h1>
</header>



<div class="video-box">


<video controls>

<source src="" type="video/mp4">

</video>



<div class="info">

<h2>@zayed</h2>

<p>أول فيديو في Dash 🎬</p>

</div>



<div class="buttons">

<button onclick="like()">❤️</button>

<button>💬</button>

<button>📤</button>

</div>



</div>




<nav>

<span>🏠</span>

<span>🔍</span>

<span>➕</span>

<span>👤</span>

</nav>



<script>

function like(){

alert("تم الإعجاب ❤️");

}

</script>



</body>

</html>
