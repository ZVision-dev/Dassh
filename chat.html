<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المحادثة - Dash</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding-bottom:80px;
}


header{
background:#111;
padding:15px;
text-align:center;
font-size:20px;
}


#messages{

padding:15px;
height:70vh;
overflow-y:auto;

}


.msg{

padding:10px;
margin:10px;
border-radius:15px;
max-width:70%;

}


.me{

background:#0066ff;
margin-right:auto;

}


.other{

background:#333;
margin-left:auto;

}


.bottom{

position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px;
display:flex;

}


input{

flex:1;
padding:12px;
border-radius:20px;
border:0;

}


button{

background:#0066ff;
color:white;
border:0;
padding:10px 20px;
border-radius:20px;
margin-right:5px;

}


</style>

</head>


<body>


<header id="title">

💬 المحادثة

</header>


<div id="messages"></div>


<div class="bottom">

<input id="text" placeholder="اكتب رسالة">


<button id="send">

إرسال

</button>


</div>
<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {

getFirestore,
collection,
addDoc,
getDocs,
query,
where,
orderBy

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


import {

getAuth,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig={

apiKey:"AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain:"dassh-e5b89.firebaseapp.com",

projectId:"dassh-e5b89",

storageBucket:"dassh-e5b89.firebasestorage.app",

messagingSenderId:"360444967805",

appId:"1:360444967805:web:fe10ef5a579424141caa14"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);



let me="زائر";

let target="";



let params=new URLSearchParams(location.search);

target=params.get("user");



document.getElementById("title").innerHTML=
"💬 "+target;



onAuthStateChanged(auth,(user)=>{


if(user){

me=user.email;

loadChat();

}


});





async function loadChat(){


let box=document.getElementById("messages");


box.innerHTML="";


let data=await getDocs(

query(

collection(db,"messages"),

orderBy("time")

)

);



data.forEach((item)=>{


let msg=item.data();



if(

(msg.from==me && msg.to==target)

||

(msg.from==target && msg.to==me)

){



box.innerHTML += `

<div class="msg ${msg.from==me ? 'me':'other'}">

${msg.text}

</div>

`;


}



});


box.scrollTop=box.scrollHeight;


}document.getElementById("send").onclick=async function(){


let input=document.getElementById("text");

let text=input.value.trim();



if(text=="") return;



await addDoc(

collection(db,"messages"),

{

from:me,

to:target,

text:text,

time:new Date()

}

);



input.value="";


loadChat();


}





</script>


</body>

</html>
