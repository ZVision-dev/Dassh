<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المحادثة - Dash</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding-bottom:80px;
}


header{
background:#111;
padding:15px;
text-align:center;
font-size:20px;
}


#messages{

padding:15px;
height:70vh;
overflow-y:auto;

}


.msg{

padding:10px;
margin:10px;
border-radius:15px;
max-width:70%;

}


.me{

background:#0066ff;
margin-right:auto;

}


.other{

background:#333;
margin-left:auto;

}


.bottom{

position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
padding:10px;
display:flex;

}


input{

flex:1;
padding:12px;
border-radius:20px;
border:0;

}


button{

background:#0066ff;
color:white;
border:0;
padding:10px 20px;
border-radius:20px;
margin-right:5px;

}


</style>

</head>


<body>


<header id="title">

💬 المحادثة

</header>


<div id="messages"></div>


<div class="bottom">

<input id="text" placeholder="اكتب رسالة">


<button id="send">

إرسال

</button>


</div>
