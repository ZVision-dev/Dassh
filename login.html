<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول - Dash</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.box{
width:90%;
max-width:400px;
margin:50px auto;
background:#181818;
padding:20px;
border-radius:20px;
}

input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

button{
background:#333;
color:white;
border:none;
padding:12px 25px;
border-radius:20px;
}

</style>

</head>


<body>


<div class="box">

<h1>🔐 تسجيل الدخول</h1>


<input id="email" placeholder="البريد الإلكتروني">


<input id="password" type="password" placeholder="كلمة المرور">


<button onclick="login()">
دخول
</button>


<p id="result"></p>


</div>



<script type="module">


import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig = {

apiKey: "AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain: "dassh-e5b89.firebaseapp.com",

projectId: "dassh-e5b89",

storageBucket: "dassh-e5b89.firebasestorage.app",

messagingSenderId: "360444967805",

appId: "1:360444967805:web:fe10ef5a579424141caa14"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.login = async function(){


let email = document.getElementById("email").value;

let password = document.getElementById("password").value;



try{


await signInWithEmailAndPassword(
auth,
email,
password
);



document.getElementById("result").innerHTML =
"✅ تم تسجيل الدخول";



setTimeout(()=>{

window.location.href="index.html";

},1000);



}


catch(error){


document.getElementById("result").innerHTML =
"❌ بيانات الدخول غير صحيحة";


}



}



</script>


</body>

</html>
