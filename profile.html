<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحساب - Dash</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.box{
width:90%;
max-width:400px;
margin:30px auto;
background:#181818;
padding:20px;
border-radius:20px;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

input,textarea{
width:90%;
padding:10px;
margin:8px;
border-radius:10px;
border:0;
}

textarea{
height:80px;
resize:none;
}

button{
background:#333;
color:white;
border:0;
padding:10px;
border-radius:20px;
margin:5px;
}

.delete{
background:#900;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
margin:15px;
}

.post{
background:#222;
padding:15px;
margin:15px 0;
border-radius:15px;
}

.post img{
width:100%;
border-radius:15px;
}

</style>

</head>


<body>


<div class="box">


<img id="photo" class="profile-img" src="https://picsum.photos/200">


<h1 id="name">...</h1>


<p id="email"></p>


<p id="bio">...</p>


<div class="stats">

<div>
👥 المتابعون
<br>
<span id="followers">0</span>
</div>


<div>
➕ أتابع
<br>
<span id="following">0</span>
</div>


</div>



<h3>✏️ تعديل الملف</h3>


<input id="newName" placeholder="الاسم الجديد">


<input id="newPhoto" placeholder="رابط الصورة">


<textarea id="newBio" placeholder="اكتب نبذة عنك"></textarea>


<button onclick="updateProfile()">

💾 حفظ

</button>


<br>


<button onclick="logout()">

🚪 تسجيل الخروج

</button>



<h2>📌 منشوراتي</h2>


<div id="myPosts"></div>


</div><script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {

getFirestore,
doc,
getDoc,
updateDoc,
collection,
getDocs,
query,
where,
deleteDoc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";



import {

getAuth,
onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig={

apiKey:"AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain:"dassh-e5b89.firebaseapp.com",

projectId:"dassh-e5b89",

storageBucket:"dassh-e5b89.firebasestorage.app",

messagingSenderId:"360444967805",

appId:"1:360444967805:web:fe10ef5a579424141caa14"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);



let uid="";

let username="";


const postsBox=document.getElementById("myPosts");



onAuthStateChanged(auth,async(user)=>{


if(user){


uid=user.uid;


document.getElementById("email").innerHTML=user.email;



let userDoc=await getDoc(

doc(db,"users",uid)

);



if(userDoc.exists()){


let data=userDoc.data();



username=data.username;



document.getElementById("name").innerHTML=
"👤 "+username;



document.getElementById("photo").src=
data.photo || "https://picsum.photos/200";



document.getElementById("bio").innerHTML=
data.bio || "لا يوجد وصف";



loadPosts();



loadStats();


}


}


});




async function loadPosts(){


let posts=await getDocs(

query(

collection(db,"posts"),

where("username","==",username)

)

);



posts.forEach((item)=>{


let post=item.data();



postsBox.innerHTML += `

<div class="post">


${post.image ? `<img src="${post.image}">`:""}


<p>${post.text}</p>



<button class="delete" onclick="deletePost('${item.id}')">

🗑️ حذف

</button>


</div>

`;



});


}



async function loadStats(){


let followers=await getDocs(

query(

collection(db,"follows"),

where("following","==",username)

)

);



let following=await getDocs(

query(

collection(db,"follows"),

where("follower","==",username)

)

);



document.getElementById("followers").innerHTML=
followers.size;



document.getElementById("following").innerHTML=
following.size;


}window.updateProfile=async function(){


let name=document.getElementById("newName").value;

let photo=document.getElementById("newPhoto").value;

let bio=document.getElementById("newBio").value;



let data={};



if(name){

data.username=name;

username=name;

}



if(photo){

data.photo=photo;

}



if(bio){

data.bio=bio;

}



await updateDoc(

doc(db,"users",uid),

data

);



alert("✅ تم تحديث الملف");

location.reload();


}




window.deletePost=async function(id){


await deleteDoc(

doc(db,"posts",id)

);


alert("🗑️ تم حذف المنشور");


location.reload();


}




window.logout=function(){


signOut(auth);


location.href="login.html";


}



</script>


</body>

</html>
