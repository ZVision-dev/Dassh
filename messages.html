<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المحادثات - Dash</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.box{
width:90%;
max-width:400px;
margin:30px auto;
background:#181818;
padding:20px;
border-radius:20px;
}

.chat{

background:#222;
padding:15px;
border-radius:15px;
margin:10px;
cursor:pointer;
text-align:right;

}

.chat:hover{

background:#333;

}

button{

background:#333;
color:white;
border:0;
padding:10px 20px;
border-radius:20px;

}

</style>

</head>


<body>


<div class="box">


<h1>💬 المحادثات</h1>


<div id="list"></div>


</div>



<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {

getFirestore,
collection,
getDocs,
query,
where

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


import {

getAuth,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";



const firebaseConfig={

apiKey:"AIzaSyCEXGRHOK4sfDZcxOpEsDEoyyG12BqV0io",

authDomain:"dassh-e5b89.firebaseapp.com",

projectId:"dassh-e5b89",

storageBucket:"dassh-e5b89.firebasestorage.app",

messagingSenderId:"360444967805",

appId:"1:360444967805:web:fe10ef5a579424141caa14"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);



let me="زائر";



onAuthStateChanged(auth,(user)=>{

if(user){

me=user.email;

loadChats();

}

});




async function loadChats(){


let users=[];



let sent=await getDocs(

query(

collection(db,"messages"),

where("from","==",me)

)

);



sent.forEach((m)=>{

let data=m.data();

if(!users.includes(data.to)){

users.push(data.to);

}

});




let received=await getDocs(

query(

collection(db,"messages"),

where("to","==",me)

)

);



received.forEach((m)=>{

let data=m.data();

if(!users.includes(data.from)){

users.push(data.from);

}

});




let box=document.getElementById("list");



users.forEach((user)=>{


box.innerHTML += `

<div class="chat" onclick="openChat('${user}')">

👤 ${user}

<br>

اضغط لفتح المحادثة 💬

</div>

`;

});


}





window.openChat=function(user){

location.href="chat.html?user="+user;

}



</script>


</body>

</html>
